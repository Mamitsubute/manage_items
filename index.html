<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>商品管理ツール</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>商品管理ツール</h1>
    </header>

    <div class="toolbar">
      <input type="text" id="searchInput" placeholder="商品名・カテゴリで検索..." />
      <button class="btn btn-primary" id="openAddModal">+ 商品を追加</button>
    </div>

    <div class="stats">
      <span id="itemCount">0件</span>の商品
    </div>

    <table id="itemTable">
      <thead>
        <tr>
          <th>ID</th>
          <th>商品名</th>
          <th>カテゴリ</th>
          <th>価格</th>
          <th>在庫数</th>
          <th>操作</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>

    <p id="emptyMessage" class="empty-message" style="display:none;">商品がありません</p>
  </div>

  <!-- モーダル -->
  <div id="modal" class="modal-overlay" style="display:none;">
    <div class="modal">
      <h2 id="modalTitle">商品を追加</h2>
      <form id="itemForm">
        <input type="hidden" id="editId">
        <div class="form-group">
          <label for="name">商品名 <span class="required">*</span></label>
          <input type="text" id="name" placeholder="例：ノートPC" required>
        </div>
        <div class="form-group">
          <label for="category">カテゴリ <span class="required">*</span></label>
          <input type="text" id="category" placeholder="例：電子機器" required>
        </div>
        <div class="form-group">
          <label for="price">価格（円） <span class="required">*</span></label>
          <input type="number" id="price" placeholder="例：99800" min="0" required>
        </div>
        <div class="form-group">
          <label for="stock">在庫数 <span class="required">*</span></label>
          <input type="number" id="stock" placeholder="例：10" min="0" required>
        </div>
        <div class="form-actions">
          <button type="button" class="btn btn-secondary" id="closeModal">キャンセル</button>
          <button type="submit" class="btn btn-primary" id="submitBtn">追加</button>
        </div>
      </form>
    </div>
  </div>

  <!-- 削除確認モーダル -->
  <div id="deleteModal" class="modal-overlay" style="display:none;">
    <div class="modal modal-sm">
      <h2>削除の確認</h2>
      <p id="deleteMessage"></p>
      <div class="form-actions">
        <button class="btn btn-secondary" id="cancelDelete">キャンセル</button>
        <button class="btn btn-danger" id="confirmDelete">削除する</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
